<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicial</title>
    <style>
        
        body {
            background-color: #f9f7f0;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; /* Usa a altura total da tela */
            font-family: sans-serif;
            overflow: hidden; /* Evita barras de rolagem indesejadas por causa do vídeo */
        }

        
        #video-fundo {
            position: fixed;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -1; /* Joga o vídeo para trás do conteúdo */
            transform: translate(-50%, -50%);
            object-fit: cover; /* Faz o vídeo cobrir a tela sem distorcer */
        }

       
        .conteudo-central {
            position: relative; /* Garante que fique posicionada à frente do vídeo fixo */
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 40px;
            border-radius: 15px; /* Deixa os cantos levemente arredondados e modernos */
            max-width: 90%; /* Evita que quebre em telas de celular */
        }

        /* Estilo do seu título com o efeito Neon */
        .tam {
            color: #1d6469;
            font-size: 55px; /* Ajustado para 55px para caber melhor na caixa */
            margin: 0 0 30px 0; /* Remove margens e adiciona 30px de espaço apenas embaixo */
            text-shadow: 
                0 0 5px #0385ff, 
                0 0 10px #00d9ff, 
                0 0 20px #66b9dd, 
                0 0 40px #00eeff;
            animation: oscilarBrilho 1.5s infinite alternate;
        }

        /* Estilo do seu link/botão */
        .tamanho {
            font-size: 35px;
            color: #114d52;
            text-decoration: none; /* Remove o sublinhado feio do link */
            font-weight: bold;
            transition: transform 0.2s; /* Efeito suave ao passar o mouse */
        }

        .tamanho:hover {
            color: #ffffff; /* Muda para a cor do neon ao passar o mouse */
            transform: scale(1.05); /* Aumenta levemente de tamanho */
            font-weight: bold;
            /* Define o nome da animação, duração de 0.8s, repetição infinita */
            animation: piscar 1.0s infinite step-start; 
        }

        @keyframes piscar {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Animação que faz o brilho do Neon pulsar */
        @keyframes oscilarBrilho {
            from {
                text-shadow: 0 0 5px #0db180, 0 0 10px #2d6d5c, 0 0 20px #2d6d5c;
            }
            to {
                text-shadow: 0 0 10px #57e4b9, 0 0 20px #2d6d5c, 0 0 40px #2d6d5c, 0 0 60px #2d6d5c;
            }
        }
    </style>
</head>
<body>
    
    <!-- Vídeo inserido com autoplay, loop e sem som -->
    <video autoplay loop muted id="video-fundo">
        <source src="vch.mp4" type="video/mp4">
        Seu navegador não suporta vídeos HTML5.
    </video>

    <!-- Esta div junta os dois elementos e os força a ficar um embaixo do outro -->
    <div class="conteudo-central">
        <h1 class="tam">Softwares</h1>
        <a class="tamanho" href="pg2.html">Continuar</a>
    </div>

</body>
</html>
